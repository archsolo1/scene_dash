name: scene_benchmark
description: >-
  On-device scene benchmark: a large grid of entity-bound cubes (most static, a
  fraction spinning), synced every frame through the bridge. Prints per-frame
  build (UI: ECS + sync) vs raster (GPU: rendering) timings to decide whether
  changed-only scene sync is worth implementing. Run on the Flutter master
  channel with `flutter run --profile --enable-flutter-gpu`.
publish_to: none
resolution: workspace

environment:
  sdk: ^3.6.0
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_scene: ^0.18.1
  scene_dash:
    path: ../../packages/scene_dash
  scene_dash_flutter_scene:
    path: ../../packages/scene_dash_flutter_scene
  vector_math: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  scene_dash_generator:
    path: ../../packages/scene_dash_generator
  build_runner: ^2.15.0
  flutter_lints: ^6.0.0

flutter: {}
