name: scene_benchmark
description: On-device flutter_scene integration benchmark for Scene-Dash.
publish_to: none
resolution: workspace

environment:
  sdk: ^3.11.0
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_scene: ^0.18.1
  scene_dash:
    path: ../../packages/scene_dash
  scene_dash_flutter_scene:
    path: ../../packages/scene_dash_flutter_scene
  vector_math: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
